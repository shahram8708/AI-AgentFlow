{% extends 'base.html' %}

{% block title %}Bad Request{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 text-center">
      <h1 class="display-1 fw-bold text-primary mb-3">400</h1>
      <h2 class="fw-semibold mb-3">Bad Request</h2>
      <p class="text-muted mb-4">The request could not be processed. Please review the submitted information and try again.</p>
      <div class="d-flex justify-content-center gap-2 flex-wrap">
        <button class="btn btn-outline-primary" onclick="history.back()">Go Back</button>
        <a class="btn btn-primary" href="{{ url_for('public.home') }}">Go to Home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
