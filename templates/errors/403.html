{% extends 'base.html' %}

{% block title %}Forbidden{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 text-center">
      <h1 class="display-1 fw-bold text-primary mb-3">403</h1>
      <h2 class="fw-semibold mb-3">Forbidden</h2>
      <p class="text-muted mb-4">You do not have permission to access this resource. Contact your administrator for access.</p>
      <div class="d-flex justify-content-center gap-2 flex-wrap">
        <button class="btn btn-outline-primary" onclick="history.back()">Go Back</button>
        <a class="btn btn-outline-secondary" href="/support">Request Access</a>
        <a class="btn btn-primary" href="{{ url_for('public.home') }}">Go to Home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
