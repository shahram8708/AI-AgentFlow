<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Arial,sans-serif;color:#1e293b;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;border-collapse:collapse;">
            <tr>
              <td style="background-color:#0f172a;color:#ffffff;padding:30px 32px;font-size:24px;font-weight:700;letter-spacing:-0.02em;">
                AgentFlow
              </td>
            </tr>
            <tr>
              <td style="background-color:#ffffff;padding:40px 32px;line-height:1.6;font-size:16px;">
                {% block email_content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="background-color:#e2e8f0;padding:20px 32px;color:#64748b;font-size:12px;line-height:1.6;">
                <div style="margin-bottom:8px;">AgentFlow Technologies Pvt. Ltd., Ahmedabad, Gujarat, India</div>
                <div style="margin-bottom:8px;">
                  <a href="#" style="color:#334155;text-decoration:underline;">Unsubscribe</a>
                </div>
                <div>This email was sent by AgentFlow.</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
